; If you need more FPS, use TAA and lower rendering accuracy to 0.8

[ConsoleVariables]
r.PSOPrecaching=1
r.PSOPrecache.Validation=2
r.PSOPrecache.Validation.TrackMinimalPSOs=1
r.ShaderPipelineCache.ExcludePrecachePSO=1
r.ShaderPipelineCache.StartupMode=3
; --- Post Processing ---
;r.FilmGrain=0
;r.Tonemapper.Quality=0
;r.DOF.Kernel.MaxBackgroundRadius=0
;r.DOF.Kernel.MaxForegroundRadius=0
;r.LightShaftBloomQuality=0
r.SceneColorFringeQuality=0
; --- Shadows ---
r.Shadow.RadiusThreshold=0.01
r.Shadow.MinResolution=512
r.Shadow.MaxResolution=512
r.Shadow.MaxCSMResolution=1024
r.Shadow.DistanceScale=0.7
r.Shadow.PreShadowResolutionFactor=0.8
r.Shadow.FarCascadesResolutionRatio=0.8
; --- Ambient Occlusion ---
r.DistanceFieldAO=0
r.AmbientOcclusionMaxQuality=100
r.SkylightIntensityMultiplier=0.8
; --- View Distance / LoD ---
r.StaticMeshLODDistanceScale=0.5
r.MaterialQualityLevel=1
r.ViewDistanceScale=1.2
foliage.LODDistanceScale=0.9
r.LightMaxDrawDistanceScale=1.0
wp.Runtime.GridLoadingRangeLevel=1
wp.Runtime.GridLoadingRangeScale=0.8
wp.Runtime.HLODLoadingRangeScale=0.9
; --- Streaming / Texture ---
r.MaxAnisotropy=16
r.Streaming.Boost=1.0
; Reduce r.Streaming.PoolSize if still getting FPS drop in combat / exiting menu
r.Streaming.PoolSize=1536
r.PRT.ReducedMemory=1
r.VirtualTextureReducedMemory=1
; --- Reflections / Others ---
r.Lumen.Reflections.SmoothBias=0.55
r.SSR.HalfResSceneColor=0
r.SSR.MaxRoughness=0.65
r.LightShaftDownSampleFactor=2
a.URO.ForceAnimRate=1
r.Upscale.Quality=3
r.UIRenderTargetQuality=100.0
; --- Anti-aliasing ---
r.SMAA.Quality=3
r.SMAA.MaxSearchSteps=32
r.SMAA.MaxSearchStepsDiagonal=16
r.TemporalAA.Quality=3
r.TemporalAA.QualityForToon=3
r.TemporalAACurrentFrameWeight=0.35
r.TemporalAAFilterSize=0.1
r.TemporalAASamples=4
r.TemporalAA.Upsampling=1
r.TSR.Velocity.WeightClampingSampleCount=1.0
r.TSR.ShadingRejection.Flickering.Period=0.05
r.TSR.Velocity.WeightClampingPixelSpeed=0.5
r.TSR.History.SampleCount=16

; --- UI Scale ---
[/Script/Engine.UserInterfaceSettings]
ApplicationScale=1.0

; --- Logging ---
[Core.Log]
global=none